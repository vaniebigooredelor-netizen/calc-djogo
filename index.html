<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJOGO CALCULATE</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0066FF">
  <style>
    body{background:#0a0a0a;color:#fff;font-family:sans-serif;margin:0;padding:10px}
    h2{color:#0078d4;margin:10px 0 5px;text-align:center}
    .logo{font-size:14px;color:#888;text-align:center;margin-bottom:10px}
    #e{width:95%;height:70px;font-size:40px;text-align:right;background:#1c1c1e;color:#fff;border:none;border-radius:10px;padding:0 10px;margin-bottom:10px}
    .grille{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    button{height:65px;font-size:26px;border:none;border-radius:10px;background:#333;color:#fff}
    button:active{transform:scale(0.95)}
    .op{background:#ff9500}
    .eq{background:#34c759;grid-column:span 2}
    .c{background:#ff3b30}
  </style>
</head>
<body>
  <h2>DJOGO CALCULATE</h2>
  <div class="logo">Créé par Chef Djogo</div>
  <input id="e" readonly>
  <div class="grille">
    <button class="c" onclick="e.value=''">C</button>
    <button onclick="e.value=e.value.slice(0,-1)">⌫</button>
    <button class="op" onclick="e.value+='%'">%</button>
    <button class="op" onclick="e.value+='/'">÷</button>
    <button onclick="e.value+='7'">7</button>
    <button onclick="e.value+='8'">8</button>
    <button onclick="e.value+='9'">9</button>
    <button class="op" onclick="e.value+='*'">×</button>
    <button onclick="e.value+='4'">4</button>
    <button onclick="e.value+='5'">5</button>
    <button onclick="e.value+='6'">6</button>
    <button class="op" onclick="e.value+='-'">−</button>
    <button onclick="e.value+='1'">1</button>
    <button onclick="e.value+='2'">2</button>
    <button onclick="e.value+='3'">3</button>
    <button class="op" onclick="e.value+='+'">+</button>
    <button onclick="e.value+='0'">0</button>
    <button onclick="e.value+='.'">.</button>
    <button class="eq" onclick="try{e.value=eval(e.value.replace('×','*').replace('÷','/'))}catch{e.value='Erreur'}">=</button>
  </div>
</body>
</html>
